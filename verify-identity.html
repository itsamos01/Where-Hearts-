<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verification Complete - Where Hearts Meet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 24px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .content {
            padding: 32px 24px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .info-row {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
        }

        .status-badge {
            background: #d4edda;
            color: #155724;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-dashboard {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="success-icon">✅</div>
            <h1>Identity Verified!</h1>
            <p>Your account has been successfully created</p>
        </div>

        <div class="content">
            <div class="status-badge">🎉 VERIFICATION COMPLETE</div>

            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">Full Name</span>
                    <span class="info-value" id="displayName"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone Number</span>
                    <span class="info-value" id="displayPhone"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email Address</span>
                    <span class="info-value" id="displayEmail"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Status</span>
                    <span class="info-value" style="color: #28a745;">Active ✓</span>
                </div>
            </div>

            <button class="btn-dashboard" onclick="goToDashboard()">Go to Dashboard →</button>
        </div>

        <div class="footer">
            <p>Thank you for joining Where Hearts Meet</p>
        </div>
    </div>

    <script>
        // Display user info from localStorage
        document.getElementById('displayName').textContent = localStorage.getItem('userName') || 'N/A';
        document.getElementById('displayPhone').textContent = localStorage.getItem('userPhone') || 'N/A';
        document.getElementById('displayEmail').textContent = localStorage.getItem('userEmail') || 'N/A';
        
        function goToDashboard() {
            // You can redirect to your main website or dashboard
            alert('Welcome to Where Hearts Meet! Our team will contact you soon.');
            // window.location.href = 'https://your-website.com';
        }
        
        // Clear localStorage after showing (optional)
        // setTimeout(() => {
        //     localStorage.clear();
        // }, 5000);
    </script>
</body>
</html>
